name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 · Lint
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        # E501 = line too long (relajado para código existente)
        run: flake8 app.py modules/ --max-line-length=120 --ignore=E501,W503,E203

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 · Tests de integración
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies for OpenCV
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libsm6 libxrender1 libxext6 ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # Instalar deps web y de test (versiones ligeras, sin CUDA)
          pip install \
            fastapi>=0.110.0 \
            "uvicorn[standard]>=0.30.0" \
            python-multipart>=0.0.9 \
            "jinja2>=3.1.0" \
            websockets>=12.0 \
            numpy>=1.21.0 \
            pyyaml>=6.0 \
            pytest>=7.4.0 \
            pytest-asyncio>=0.23.0 \
            httpx>=0.27.0 \
            pytest-mock>=3.12.0

      - name: Install torch CPU-only (evitar descarga de CUDA en CI)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install remaining dependencies
        run: |
          pip install \
            opencv-python-headless>=4.8.0 \
            scikit-learn>=1.2.0 \
            scipy>=1.10.0 \
            pandas>=2.0.0 \
            matplotlib>=3.7.0 \
            seaborn>=0.12.0 \
            tqdm>=4.65.0 \
            pillow>=9.5.0

      - name: Install ultralytics (sin GPU)
        run: pip install ultralytics>=8.0.0

      - name: Create required directories
        run: mkdir -p uploads outputs outputs_streaming outputs_heatmap weights static templates

      - name: Create dummy weights file (CI mock)
        run: touch weights/best.pt

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 · Build Docker image (sólo en push a main)
  # ─────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — sin registry configurado)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: tacticeye2:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Excluir weights del build context
          build-args: |
            BUILDKIT_INLINE_CACHE=1
